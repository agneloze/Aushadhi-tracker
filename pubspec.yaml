name: aushadhi_tracker
description: An offline-first mobile app for tracking Jan Aushadhi medicine expiry dates with FIFO logic.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend & Sync
  supabase_flutter: ^2.0.0
  
  # Local Database (Offline-first)
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.17
  path_provider: ^2.1.1
  path: ^1.8.3

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  pdf: ^3.10.7
  csv: ^6.0.0
  share_plus: ^7.2.1

  # Scanning & OCR
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.10.5+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Drift generator
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  # Hindi translations will be added to l10n later
