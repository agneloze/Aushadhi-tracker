name: aushadhi_tracker
description: An offline-first mobile app for tracking Jan Aushadhi medicine expiry dates with FIFO logic.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend & Sync
  supabase_flutter: ^2.0.0
  
  # Local Database (Offline-first)
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.17
  path_provider: ^2.1.1
  path: ^1.8.3

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  pdf: ^3.10.7
  csv: ^6.0.0
  share_plus: ^7.2.1
  font_awesome_flutter: 10.1.0

  # Scanning & OCR
  camera: ^0.10.5+5

  # AI & Images
  google_generative_ai: ^0.4.7
  image: ^4.5.4
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.0
  
  # Drift generator
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

  # Launcher Icons
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48
flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
